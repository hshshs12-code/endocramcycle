<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENRE — Final Cram (protected)</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4f2ec; --surface:#ffffff; --ink:#1c2024; --muted:#6c7077;
  --line:#e3ded3; --line-strong:#cdc6b6;
  --exam-bg:#fdeceb; --exam-ink:#9a1f2e; --exam-strong:#7a1422;
  --gene-bg:#d8efe9; --gene-ink:#0c5247;
  --buzz-hl:#fff3c4; --ok:#1f7a4d; --okbg:#e4f4ea; --nobg:#fdecec; --no:#b0243a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--exam-strong)}
header.fchdr{max-width:1080px;margin:0 auto;padding:34px 26px 0}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted);margin:0 0 8px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(28px,5vw,46px);line-height:1.03;margin:0;letter-spacing:-.01em}
h1 em{font-style:italic;color:var(--exam-strong)}
.sub{color:var(--muted);max-width:70ch;margin:13px 0 0;font-size:14.5px}
.wrap{max-width:1080px;margin:22px auto 70px;padding:0 26px}
.grouphd{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--exam-strong);margin:34px 0 14px;border-bottom:1px solid var(--line-strong);padding-bottom:8px;
  display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.grouphd .gc{color:var(--muted);font-size:10.5px;letter-spacing:.1em}

.fccard{background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;
  padding:18px 20px 16px;margin:0 0 16px;position:relative}
.fchd{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px}
.fctag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gene-ink);background:var(--gene-bg);padding:3px 9px;border-radius:6px;white-space:nowrap}
.leclink{font-family:'IBM Plex Mono',monospace;font-size:11px;text-decoration:none;color:#fff;background:var(--exam-strong);
  padding:5px 11px;border-radius:8px;white-space:nowrap;transition:.12s;border:1px solid transparent}
.leclink:hover{background:#5c0f1a}
.fccard h3{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:4px 0 12px;letter-spacing:-.005em;line-height:1.15}
.fcsec{margin:0 0 11px}
.fcsec h4{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin:0 0 4px}
.fcsec p, .fcsec{font-size:14px}
.fcsec b{color:var(--ink)}
.fcsec sub,.fcsec sup{font-size:75%}

.fcverbatim{margin-top:12px;border-left:3px solid var(--line-strong);background:#faf8f2;border-radius:0 8px 8px 0;padding:9px 13px}
.fcverbatim .vlabel{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.fcverbatim pre{margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.5;color:#3a3f45;white-space:pre-wrap;word-break:break-word}

details.fcquiz{margin-top:13px;border:1px solid var(--line);border-radius:11px;background:#fbfaf6;overflow:hidden}
details.fcquiz>summary{cursor:pointer;list-style:none;padding:10px 14px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;letter-spacing:.05em;color:var(--exam-strong);font-weight:600;display:flex;align-items:center;gap:8px}
details.fcquiz>summary::-webkit-details-marker{display:none}
details.fcquiz>summary::before{content:"▸";transition:.15s;display:inline-block}
details.fcquiz[open]>summary::before{transform:rotate(90deg)}
.fcq-score{color:var(--muted);font-weight:500;letter-spacing:.02em}
.fcq{padding:12px 15px;border-top:1px solid var(--line)}
.fcq-q{font-weight:600;font-size:13.5px;margin-bottom:9px}
.fcq-opts{display:flex;flex-direction:column;gap:6px}
.fcq-opt{text-align:left;font:inherit;font-size:13px;background:#fff;border:1px solid var(--line-strong);
  border-radius:8px;padding:8px 12px;cursor:pointer;transition:.1s;color:var(--ink)}
.fcq-opt:hover{border-color:var(--ink)}
.fcq-opt.correct{background:var(--okbg);border-color:var(--ok);color:#14663c;font-weight:600}
.fcq-opt.wrong{background:var(--nobg);border-color:var(--no);color:#8f1b2c}
.fcq-opt.dim{opacity:.55}
.fcq.answered .fcq-opt{cursor:default}
.fcq-exp{display:none;margin-top:9px;font-size:12.5px;color:#4a4f55;background:#fff;border:1px dashed var(--line-strong);
  border-radius:8px;padding:8px 12px}
.fcq.answered .fcq-exp{display:block}
.fcq-exp::before{content:"Why ▸ ";font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

footer.fcft{max-width:1080px;margin:0 auto 60px;padding:0 26px;color:var(--muted);font-size:12px}
footer.fcft hr{border:none;border-top:1px solid var(--line-strong);margin:0 0 14px}
@media(max-width:600px){ .fccard h3{font-size:19px} }

.fc-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.fc-lock{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--line-strong);
  border-radius:16px;padding:30px 28px;box-shadow:0 10px 40px rgba(0,0,0,.06);text-align:center}
.fc-lock .lk{font-size:34px;margin-bottom:8px}
.fc-lock h1{font-family:'Fraunces',serif;font-weight:600;font-size:27px;margin:0 0 6px}
.fc-lock p{color:var(--muted);font-size:13px;margin:0 0 18px}
.fc-lock form{display:flex;gap:8px}
.fc-lock input{flex:1;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line-strong);
  border-radius:10px;background:#fbfaf6;color:var(--ink)}
.fc-lock input:focus{outline:none;border-color:var(--exam-strong)}
.fc-lock button{font:inherit;font-weight:600;font-size:14px;color:#fff;background:var(--exam-strong);
  border:none;border-radius:10px;padding:11px 16px;cursor:pointer;transition:.12s}
.fc-lock button:hover{background:#5c0f1a}
.fc-lock button:disabled{opacity:.6;cursor:default}
.fc-err{color:var(--no);font-size:12.5px;margin-top:12px;min-height:16px;font-family:'IBM Plex Mono',monospace}
.fc-note{color:var(--muted);font-size:11px;margin-top:16px;line-height:1.5}
.fc-topbar{max-width:1080px;margin:14px auto 0;padding:0 26px}
.fc-topbar a{font-family:'IBM Plex Mono',monospace;font-size:12px;text-decoration:none;color:var(--muted)}
.fc-topbar a:hover{color:var(--exam-strong)}
#fc-content{display:none}
</style></head><body>
<div class="fc-gate" id="fc-gate">
  <div class="fc-lock">
    <div class="lk">&#128274;</div>
    <h1>Final Cram</h1>
    <p>This page is encrypted. Enter the password to decrypt it in your browser.</p>
    <form id="fc-form" autocomplete="off">
      <input id="fc-pw" type="password" placeholder="Password" autofocus aria-label="Password">
      <button id="fc-btn" type="submit">Unlock</button>
    </form>
    <div class="fc-err" id="fc-err"></div>
    <div class="fc-note">Nothing is stored on a server. The content is AES-GCM encrypted inside this file itself —
    without the password it cannot be read, even by downloading the page source.</div>
  </div>
</div>
<div id="fc-content"></div>
<script>
(function(){
  var KEY='fcQuiz_v1';
  function load(){ try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}} }
  function save(s){ try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){} }
  function applyOne(fcq){
    var cid=(fcq.closest('details.fcquiz')||{}).getAttribute? fcq.closest('details.fcquiz').getAttribute('data-cid'):null;
    var qi=fcq.getAttribute('data-qi'), ans=parseInt(fcq.getAttribute('data-a'),10);
    var st=load(); var sel=(st[cid]||{})[qi];
    if(sel==null) return;
    sel=parseInt(sel,10);
    var opts=fcq.querySelectorAll('.fcq-opt');
    fcq.classList.add('answered');
    opts.forEach(function(o,i){
      o.classList.remove('correct','wrong','dim');
      if(i===ans) o.classList.add('correct');
      else if(i===sel) o.classList.add('wrong');
      else o.classList.add('dim');
    });
  }
  function scoreDetails(det){
    var fcqs=det.querySelectorAll('.fcq'); var cid=det.getAttribute('data-cid'); var st=load();
    var done=0,right=0,total=fcqs.length;
    fcqs.forEach(function(fcq){
      var qi=fcq.getAttribute('data-qi'), ans=parseInt(fcq.getAttribute('data-a'),10);
      var sel=(st[cid]||{})[qi];
      if(sel!=null){ done++; if(parseInt(sel,10)===ans) right++; }
    });
    var el=det.querySelector('.fcq-score');
    if(!el) return;
    el.textContent = done? ('· '+right+'/'+total+' correct'+(done<total?(' ('+done+' answered)'):'')) : ('· '+total+' questions');
  }
  function initRoot(root){
    root.querySelectorAll('.fcq').forEach(applyOne);
    root.querySelectorAll('details.fcquiz').forEach(scoreDetails);
  }
  document.addEventListener('click',function(e){
    var btn=e.target.closest? e.target.closest('.fcq-opt'):null;
    if(!btn) return;
    var fcq=btn.closest('.fcq'); if(!fcq||fcq.classList.contains('answered')) return;
    var det=fcq.closest('details.fcquiz'); var cid=det?det.getAttribute('data-cid'):'_';
    var qi=fcq.getAttribute('data-qi');
    var opts=[].slice.call(fcq.querySelectorAll('.fcq-opt'));
    var sel=opts.indexOf(btn);
    var st=load(); st[cid]=st[cid]||{}; st[cid][qi]=sel; save(st);
    applyOne(fcq); if(det) scoreDetails(det);
  });
  window.FCinit=initRoot;
})();
</script>
